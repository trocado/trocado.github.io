<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 200" role="img" aria-label="Assinatura — Leandro Trocado">
  <title>Assinatura de e-mail · vector</title>
  <defs>
    <linearGradient id="lime-e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4FF00"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>
  </defs>
  <rect width="620" height="200" fill="#0A0A0A" rx="10"/>
  <!-- Acento lateral -->
  <rect x="0" y="0" width="6" height="200" fill="url(#lime-e)"/>
  <!-- Mark -->
  <g transform="translate(30, 35) scale(0.85)">
    <path d="M 20 30 L 80 80 L 20 130" fill="none" stroke="#67E8F9" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <path d="M 70 30 L 130 80 L 70 130" fill="none" stroke="url(#lime-e)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="130" cy="80" r="9" fill="#FB923C"/>
  </g>
  <!-- Divider -->
  <line x1="190" y1="40" x2="190" y2="160" stroke="#06B6D4" stroke-width="1" opacity="0.4"/>
  <!-- Nome -->
  <text x="210" y="62" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="26" fill="#FAFAFA" letter-spacing="-1">Leandro Trocado<tspan fill="#D4FF00">.</tspan></text>
  <text x="210" y="88" font-family="'JetBrains Mono', monospace" font-weight="500" font-size="12" fill="#67E8F9" letter-spacing="2">GERENTE DE TI · GETEC</text>
  <text x="210" y="108" font-family="'Space Grotesk', sans-serif" font-weight="400" font-size="13" fill="#7C7C7C">Serpros Fundo Multipatrocinado</text>
  <!-- Contato -->
  <text x="210" y="142" font-family="'JetBrains Mono', monospace" font-weight="400" font-size="12" fill="#FAFAFA" opacity="0.7">trocado@gmail.com</text>
  <text x="210" y="160" font-family="'JetBrains Mono', monospace" font-weight="400" font-size="12" fill="#D4FF00" opacity="0.9">trocado.com.br</text>
  <text x="210" y="178" font-family="'JetBrains Mono', monospace" font-weight="400" font-size="10" fill="#FAFAFA" opacity="0.35" letter-spacing="2">RJ · 22.9° S · 43.1° W</text>
</svg>
