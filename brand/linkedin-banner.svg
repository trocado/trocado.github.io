<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" role="img" aria-label="Leandro Trocado">
  <title>Banner LinkedIn — vector</title>
  <defs>
    <radialGradient id="b1" cx="0.15" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="0.85" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b3" cx="0.6" cy="0.95" r="0.45">
      <stop offset="0%" stop-color="#D4FF00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4FF00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lime-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4FF00"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="#0A0A0A"/>
  <rect width="1584" height="396" fill="url(#b1)"/>
  <rect width="1584" height="396" fill="url(#b2)"/>
  <rect width="1584" height="396" fill="url(#b3)"/>

  <!-- Grid técnico -->
  <g stroke="#FAFAFA" stroke-width="1" opacity="0.05">
    <line x1="0" y1="80" x2="1584" y2="80"/>
    <line x1="0" y1="316" x2="1584" y2="316"/>
    <line x1="200" y1="0" x2="200" y2="396"/>
  </g>

  <!-- Etiqueta técnica topo -->
  <text x="160" y="75" font-family="'JetBrains Mono', monospace" font-weight="500" font-size="14" fill="#D4FF00" letter-spacing="3" opacity="0.85">// vector.001 · since 1985</text>

  <!-- Mark -->
  <g transform="translate(160, 130) scale(1.1)">
    <path d="M 20 30 L 80 80 L 20 130" fill="none" stroke="#67E8F9" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <path d="M 70 30 L 130 80 L 70 130" fill="none" stroke="url(#lime-b)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="130" cy="80" r="9" fill="#FB923C"/>
  </g>

  <!-- Wordmark -->
  <text x="400" y="195" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="78" fill="#FAFAFA" letter-spacing="-3">Leandro Trocado<tspan fill="#D4FF00">.</tspan></text>
  <text x="402" y="245" font-family="'JetBrains Mono', monospace" font-weight="400" font-size="18" fill="#67E8F9" letter-spacing="2">GERÊNCIA DE TI · PREVIDÊNCIA · IA APLICADA</text>

  <!-- Tagline -->
  <text x="400" y="320" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="32" fill="#FAFAFA" opacity="0.75">Direction is the new asset.</text>

  <!-- Coordenada técnica canto inferior direito -->
  <text x="1424" y="370" font-family="'JetBrains Mono', monospace" font-weight="400" font-size="12" fill="#FAFAFA" opacity="0.35" letter-spacing="2">22.9068° S · 43.1729° W</text>
</svg>
